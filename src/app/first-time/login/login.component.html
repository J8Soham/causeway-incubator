<div class="login-page">
  <div class="login-card">
    <h1 class="login-title">Learn step-by-step</h1>
    <p class="login-subtitle">Login or create your Causeway account</p>

    <mat-form-field class="email-field" appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput type="email" [(ngModel)]="email" (keyup.enter)="onContinue()" required id="login-email-input" />
    </mat-form-field>

    <a class="guest-link" (click)="onContinueAsGuest()" id="login-guest-link">Continue as Guest</a>

    <button mat-flat-button class="continue-btn" [disabled]="!isEmailValid()" (click)="onContinue()"
      id="login-continue-btn">
      Continue
    </button>
  </div>
</div>
