<div class="landing-page">
  <!-- Hexagon decorations - bottom left cluster -->
  <div class="hex-cluster hex-cluster-left">
    <div class="hexagon hex-1"></div>
    <div class="hexagon hex-2"></div>
    <div class="hexagon hex-3"></div>
    <div class="hexagon hex-4"></div>
    <div class="hexagon hex-5"></div>
  </div>

  <!-- Hexagon decorations - top right cluster -->
  <div class="hex-cluster hex-cluster-right">
    <div class="hexagon hex-6"></div>
    <div class="hexagon hex-7"></div>
    <div class="hexagon hex-8"></div>
    <div class="hexagon hex-9"></div>
    <div class="hexagon hex-10"></div>
  </div>

  <!-- Main content -->
  <div class="landing-content">
    <h1 class="brand-name">Causeway</h1>
    <p class="tagline">
      Learn web development in Angular<br />
      by building a project step-by-step.
    </p>
    <button mat-flat-button class="get-started-btn" (click)="onGetStarted()" id="landing-get-started-btn">
      GET STARTED
    </button>
  </div>
</div>
